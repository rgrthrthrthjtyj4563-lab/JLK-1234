display_name: JLK Patient Template Report
short_description: 生成贴近真实模板的患者问卷分析 Word 报告
default_prompt: >-
  根据患者问卷数据生成严格继承模板底稿的 Word 分析报告。正文内容只能填充模板定义的可变文字，
  不得改写为旧的"引言/数据信息分析/反馈意见分析/综合分析与建议"体系，不得参考 04_outputs
  中旧风格样本作为当前正确结构。必须按 parse_questionnaire -> cluster_dimensions ->
  build_payload -> render_from_template 的链路执行，模板分类、4.x 标题、4.x 引言、4.x 小标题、
  5.1 重点题目选择和图表点位只能由程序规则决定，AI 草稿无权覆盖。最终产物必须保留问卷调研服务结算、目录、
  前言、项目背景、项目开展情况、问卷说明、4.x 问卷结果分析、调研结果、附件1、附件2、免责申明、
  页眉、模板表格和模板图表对象。AI 草稿只允许提供前言、项目背景、4.x 正文段落、`5.2 调研结果分析` 正文和 `5.3 建议` 正文，
  任何与检测模板骨架冲突的章节标题或小标题都应直接视为污染并报错。`5.2 调研结果分析` 必须围绕问卷真实数据输出 700 字以内的结论型长文，
  固定覆盖总体结论和各维度要点，不得只写一句总结。
  `5.3 建议` 必须基于前文问卷结果暴露的真实问题动态生成，采用 1 段导语 + 2-4 条阿拉伯数字编号建议；
  每条建议必须包含问题靶子、具体载体或执行渠道、预期目的，避免固定模板话术和无执行路径的口号。
  建议要从临床规范、服务体验、渠道保障、随访监测、健康教育等方面展开，禁止使用“药企”“药企方面”作为建议主体或小标题。
  如果当前品种不在内置硬编码模板覆盖范围内，可在 `report_content.md` 的 front matter 中通过
  `dimensions_json` 字段声明维度结构（维度名称、引言、小标题关键词、图表配置），让程序动态生成维度骨架，
  无需为每个新品种修改代码。
